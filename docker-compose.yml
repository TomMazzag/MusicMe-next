services:
  backend:
    build:
      context: ../Projects/MusicMe.nosync/MusicMe-Backend
    ports:
      - "3000:3000"
    env_file:
      - ../Projects/MusicMe.nosync/MusicMe-Backend/.env
    volumes:
      - ../Projects/MusicMe.nosync/MusicMe-Backend:/app  
      - /app/node_modules 
    command: ["npm", "run", "dev"]

  frontend:
    build:
      context: .
    ports:
      - "4000:4000" 
    depends_on:
      - backend
    env_file:
      - .env
    volumes:
      - .:/app  
      - /app/node_modules
    command: ["npm", "run", "dev"]
